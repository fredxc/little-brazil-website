<html lang="en">

    <!-- Preload critical images -->
    <link rel="preload" as="image" href="/hero-bg.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/logos/logo-white.webp" />

    <!-- Primary Meta -->
    <title>
      Little Brazil Amsterdam | Brazilian Products in the Netherlands

      content="Authentic Brazilian products store in Amsterdam. Find pão de queijo, guaraná, açaí and more. Visit us at Raamsteeg 6, Amsterdam."

    <meta property="og:site_name" content="Little Brazil Amsterdam" />

      property="og:title"
      content="Little Brazil Amsterdam | Brazilian Products in the Netherlands"
    />

      property="og:description"
      content="Authentic Brazilian products store in Amsterdam. Pão de queijo, guaraná, açaí and more. Raamsteeg 6."

      name="twitter:title"
      content="Little Brazil Amsterdam | Brazilian Products"
    />

      name="twitter:description"
      content="Authentic Brazilian products in Amsterdam. Pão de queijo, guaraná, açaí and more."
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://littlebrazil.nl" />
